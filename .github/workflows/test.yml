name: Test Project
on:
  push:
    branches: 
      - feature/practice-github-actions
  workflow_dispatch: 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          nose-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
