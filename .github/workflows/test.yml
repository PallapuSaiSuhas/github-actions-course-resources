name: Test Project
on:
  push:
    branches: 
      - feature/practice-github-actions
  workflow_dispatch: 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: Code/02 Basics/02 Starting Project
      - name: Run project
        run: npm run dev
        working-directory: Code/02 Basics/02 Starting Project
      - name: Run tests
        run: npm test
        working-directory: Code/02 Basics/02 Starting Project
